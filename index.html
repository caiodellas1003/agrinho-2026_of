<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Estufa Inteligente - Agrinho 2026</title>
    <style>
        /* ==========================================
           ESTILO GERAL E VARIÁVEIS
           ========================================== */
        :root {
            --primary-color: #2e7d32;
            --primary-light: #e8f5e9;
            --primary-dark: #1b5e20;
            --accent-color: #388e3c;
            --text-color: #333333;
            --bg-card: #ffffff;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f1f8e9 0%, #dcedc8 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* ==========================================
           CONTAINER PRINCIPAL (PAINEL)
           ========================================== */
        .container {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            max-width: 650px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(46, 125, 50, 0.1);
        }

        h1 {
            color: var(--primary-dark);
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        p.subtitulo {
            color: #666;
            margin-bottom: 30px;
            font-size: 1rem;
            margin-top: 0;
        }

        /* ==========================================
           PAINEL DE STATUS (DASHBOARD)
           ========================================== */
        .status-bar {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 35px;
        }

        @media (min-width: 480px) {
            .status-bar {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .status-item {
            background-color: var(--primary-light);
            padding: 15px 10px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--primary-dark);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            gap: 5px;
            transition: transform 0.2s;
        }

        .status-item:hover {
